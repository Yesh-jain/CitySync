spring.application.name=CitySync

# In-Memory H2 Database with MySQL compatibility mode
spring.datasource.url=jdbc:h2:mem:citysync;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Defer datasource initialization so data.sql runs after JPA creates the tables
spring.jpa.defer-datasource-initialization=true

# Enable H2 Web Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Keep templates dynamic for live reload
spring.thymeleaf.cache=false
